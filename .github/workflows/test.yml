name: Test setup-tessl

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-pinned:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned version
        id: setup
        uses: ./
        with:
          version: "0.73.0"

      - name: Check tessl is on PATH
        run: which tessl

      - name: Check outputs
        run: |
          echo "Installed version: ${{ steps.setup.outputs.version }}"
          echo "Binary path: ${{ steps.setup.outputs.path }}"

  test-latest:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install latest version
        id: setup
        uses: ./

      - name: Check tessl is on PATH
        run: which tessl

      - name: Verify resolved version
        run: |
          echo "Resolved version: ${{ steps.setup.outputs.version }}"
          test -n "${{ steps.setup.outputs.version }}"

  test-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install with token
        uses: ./
        with:
          token: "test-token-value"

      - name: Verify TESSL_TOKEN is set
        run: |
          if [ -z "$TESSL_TOKEN" ]; then
            echo "::error::TESSL_TOKEN is not set"
            exit 1
          fi
          echo "TESSL_TOKEN is set"

  test-no-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install without token
        uses: ./

      - name: Verify TESSL_TOKEN is not set
        run: |
          if [ -n "$TESSL_TOKEN" ]; then
            echo "::error::TESSL_TOKEN should not be set when no token is provided"
            exit 1
          fi
          echo "TESSL_TOKEN is correctly unset"

  test-anonymous-id:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install
        uses: ./

      - name: Verify anonymous ID exists and has correct format
        run: |
          ID_FILE="$HOME/.tessl/anonymous-id"
          if [ ! -f "$ID_FILE" ]; then
            echo "::error::Anonymous ID file not created"
            exit 1
          fi
          ID=$(cat "$ID_FILE")
          if ! echo "$ID" | grep -qE '^anon-[0-9a-f]{32}$'; then
            echo "::error::Anonymous ID has wrong format: $ID"
            exit 1
          fi
          echo "Anonymous ID: $ID"

      - name: Verify anonymous ID is deterministic
        run: |
          EXISTING=$(cat "$HOME/.tessl/anonymous-id")
          if command -v sha256sum >/dev/null 2>&1; then
            HASH=$(echo -n "setup-tessl-action:${GITHUB_REPOSITORY_ID}" | sha256sum | cut -c1-32)
          else
            HASH=$(echo -n "setup-tessl-action:${GITHUB_REPOSITORY_ID}" | shasum -a 256 | cut -c1-32)
          fi
          EXPECTED="anon-${HASH}"
          if [ "$EXISTING" != "$EXPECTED" ]; then
            echo "::error::Anonymous ID mismatch: got '$EXISTING', expected '$EXPECTED'"
            exit 1
          fi
          echo "Anonymous ID is deterministic: $EXISTING"
